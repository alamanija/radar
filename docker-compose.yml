services:
  postgres:
    image: postgres:16-alpine
    container_name: radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: radar
    ports:
      - "5433:5432"
    volumes:
      - radar-pgdata:/var/lib/postgresql/data

volumes:
  radar-pgdata:
