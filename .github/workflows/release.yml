# Signed release workflow.
#
# Trigger: push a tag matching `v*.*.*` (e.g. `git tag v0.2.0 && git push --tags`).
# Output: a GitHub Release with per-platform installers + a `latest.json` manifest.
#
# Platform matrix: Apple Silicon macOS + Windows. Intentionally skipping
# Intel macOS (all Macs sold since 2020 are Apple Silicon) and Linux (no
# users asking for it yet). Add either back when a real user needs it —
# each extra target is another ~15-25 min of wall time per release.
#
# Prerequisites (one-time, per repo):
#   1. Generate an Ed25519 keypair:
#        npm run tauri signer generate -- -w ~/.tauri/radar.key
#      (Copy the public key into `src-tauri/tauri.conf.json > plugins.updater.pubkey`.)
#   2. Add these repository secrets (Settings → Secrets and variables → Actions):
#        TAURI_SIGNING_PRIVATE_KEY          - contents of ~/.tauri/radar.key
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD - password you chose at generate time

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Cache the whole workspace (`.`) not just `src-tauri`. The root
      # `Cargo.toml` is a workspace with `src-tauri` + `radar-server` as
      # members; they share `./target`. Pointing the cache at the root
      # means a single cache entry per platform covers everything and
      # hits warm on subsequent releases.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          cache-on-failure: true

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization. Intentionally NOT set here —
          # an empty APPLE_CERTIFICATE is worse than an absent one (Tauri
          # tries to import the empty string and fails). Re-add these env
          # vars once you enroll in the Apple Developer program and
          # populate the matching repo secrets:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # Until then, macOS builds are unsigned — Gatekeeper will show a
          # warning on first launch; users work around with right-click → Open.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Radar ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # After every matrix job uploads its artifacts + partial manifest, consolidate
  # the `latest.json` and publish the release. `tauri-action` handles the per-
  # platform entries; this job just flips the draft to published so the
  # updater-facing `releases/latest/download/latest.json` URL resolves.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10,
            });
            const draft = releases.find(r => r.tag_name === context.ref.replace('refs/tags/', ''));
            if (!draft) {
              core.setFailed(`no draft release found for ${context.ref}`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
            });
            core.info(`published release ${draft.tag_name}`);
